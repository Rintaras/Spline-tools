<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akim Spline Interpolation</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <canvas id="background-canvas"></canvas>
    <div class="container">
        <div class="header">
            <div>
                <h1>Akima Spline</h1>
                <div class="subtitle">データポイントを編集してリアルタイムで補間曲線を確認できます。</div>
            </div>
            <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">
                <i data-lucide="sun" id="theme-icon"></i>
                <span id="theme-text">ライト</span>
            </button>
        </div>

        <div id="loading" class="loading">Pyodideを読み込み中...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="info" class="info" style="display: none;"></div>

        <div id="main-content" style="display: none;">
            <div class="main-layout">
                <div class="sidebar">
                    <div class="panel expanded" id="data-points-panel">
                        <div class="panel-header" onclick="togglePanel('data-points-panel')">
                            <h2>データポイント</h2>
                            <div class="panel-toggle" id="data-points-toggle">
                                <i data-lucide="chevron-down"></i>
                            </div>
                        </div>
                        <div class="panel-content" id="data-points-content">
                            <div id="data-list" class="data-list"></div>
                            <button class="add-button" onclick="addDataPoint()">
                                <span>
                                    <i data-lucide="plus"></i>
                                    データポイントを追加
                                </span>
                            </button>
                            <button class="random-button" onclick="randomizeYValues()">
                                <span>
                                    <i data-lucide="shuffle"></i>
                                    Y軸をランダムに設定
                                </span>
                            </button>
                        </div>
                    </div>

                    <div class="panel expanded" id="settings-panel">
                        <div class="panel-header" onclick="togglePanel('settings-panel')">
                            <h2>設定</h2>
                            <div class="panel-toggle" id="settings-toggle">
                                <i data-lucide="chevron-down"></i>
                            </div>
                        </div>
                        <div class="panel-content" id="settings-content">
                            <div class="setting-group">
                                <label class="setting-label">補間点数</label>
                                <input type="number" id="interp-points" value="100" min="10" max="500"
                                    class="setting-input" onchange="updateChart()">
                            </div>
                            <div class="setting-group">
                                <label class="setting-label">表示オプション</label>
                                <div class="checkbox-group">
                                    <div class="checkbox-item">
                                        <input type="checkbox" id="show-points" checked onchange="updateChart()">
                                        <label for="show-points">データポイントを表示</label>
                                    </div>
                                    <div class="checkbox-item">
                                        <input type="checkbox" id="show-grid" checked onchange="updateChart()">
                                        <label for="show-grid">グリッドを表示</label>
                                    </div>
                                </div>
                            </div>
                            <div class="setting-group">
                                <label class="setting-label">補間手法の比較</label>
                                <div class="checkbox-group">
                                    <div class="checkbox-item">
                                        <input type="checkbox" id="show-akima" checked onchange="updateChart()">
                                        <label for="show-akima">Akima スプライン（Akima Spline）</label>
                                    </div>
                                    <div class="checkbox-item">
                                        <input type="checkbox" id="show-linear" onchange="updateChart()">
                                        <label for="show-linear">線形補間（Linear）</label>
                                    </div>
                                    <div class="checkbox-item">
                                        <input type="checkbox" id="show-cubic" onchange="updateChart()">
                                        <label for="show-cubic">Cubic スプライン（Cubic Spline）</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="chart-container">
                    <div id="chart"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="theme.js" defer></script>
    <script src="app.js" defer></script>
    <script src="background.js" defer></script>
</body>

</html>
